{% extends "base.html" %}
{% block title %}Login — TaskFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">◈</div>
      <h1>Welcome </h1>
      
    </div>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="form-group">
        <label for="login_id">Permanent User ID</label>
        <input
          type="text"
          id="login_id"
          name="login_id"
          placeholder="your_permanent_user_id"
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <p class="auth-footer">
      First successful login gives <strong>100 starter credits</strong>.
    </p>
    <p class="auth-footer">
      User accounts are created only by admin.
    </p>
  </div>
</div>
{% endblock %}
