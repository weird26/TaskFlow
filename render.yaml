services:
  - type: web
    name: taskflow
    runtime: python
    plan: free
    autoDeploy: false
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: DEFAULT_ADMIN_LOGIN_ID
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_ADMIN_USERNAME
        sync: false
      - key: RESET_ADMIN_PASSWORD_ON_BOOT
        value: "0"
      - key: DEBUG_ADMIN_TOKEN
        sync: false
      - key: BUSINESS_TIMEZONE
        value: "Asia/Calcutta"
      - key: ACCESS_START_HOUR
        value: "9"
      - key: ACCESS_END_HOUR
        value: "19"
      - key: ENFORCE_ACCESS_WINDOW
        value: "1"
      - key: READ_NOTIFICATION_RETENTION_DAYS
        value: "21"
      - key: COMPLETED_TASK_RETENTION_DAYS
        value: "90"
      - key: CLEANUP_INTERVAL_HOURS
        value: "12"
